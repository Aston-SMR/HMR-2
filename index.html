<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>HMR Dual System Card Counting</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
:root{
  --bg:#050505;
  --gold:#f5d06f;
  --gold2:#c89b3c;
  --line:#3a2c12;
  --text:#f7e7b3;
  --muted:#bba676;
  --blue:#60a5fa;
  --red:#f87171;
  --green:#34d399;
  --orange:#fb923c;
  --panel:#101010;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#000;
  color:var(--text);
  font-family:Arial,"Microsoft JhengHei",sans-serif;
}

.app{
  max-width:920px;
  margin:auto;
  padding:8px;
  display:grid;
  gap:8px;
}

.logo{
  text-align:center;
  border:1px solid var(--line);
  border-radius:18px;
  padding:12px;
  background:#111;
}

.logo-title{
  font-size:22px;
  font-weight:900;
  color:#fff3c2;
}

.logo-sub{
  color:#c9ae69;
  font-size:12px;
  margin-top:4px;
}

.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.side{
  border:1px solid var(--line);
  border-radius:18px;
  padding:10px;
  background:#111;
}

.side-title{
  text-align:center;
  font-weight:900;
  margin-bottom:8px;
}

.card-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.card-cell{
  height:60px;
  border-radius:12px;
  border:1px solid #5a4319;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:900;
  background:#1a1a1a;
  cursor:pointer;
}

.card-cell.span2{
  grid-column:1 / span 2;
}

.card-cell.active{
  border-color:#f5d06f;
  background:#2b220f;
}

.card-cell.empty::after{
  color:#786a4a;
  font-size:12px;
}

.p1.empty::after{content:"P1";}
.p2.empty::after{content:"P2";}
.p3.empty::after{content:"P3";}
.b1.empty::after{content:"B1";}
.b2.empty::after{content:"B2";}
.b3.empty::after{content:"B3";}

.panel{
  border:1px solid var(--line);
  border-radius:18px;
  padding:10px;
  background:#111;
}

.info-row{
  display:grid;
  grid-template-columns:auto auto 1fr auto auto;
  gap:6px;
  align-items:center;
}

.badge{
  padding:8px 12px;
  border-radius:999px;
  font-weight:900;
  background:#1b1b1b;
}

.player{color:var(--blue);}
.banker{color:var(--red);}
.tie{color:var(--green);}

.winner{
  text-align:center;
  font-size:20px;
  font-weight:900;
}

.btn{
  border:none;
  border-radius:12px;
  padding:8px 10px;
  font-weight:900;
  cursor:pointer;
  background:linear-gradient(#f5d06f,#c89b3c);
}

.btn-clear{
  background:linear-gradient(#ddd,#999);
}

.detail{
  margin-top:8px;
  color:#dbc58f;
}

.predict-line{
  font-size:24px;
  font-weight:900;
}

.predict-meta{
  margin-top:6px;
  color:#d8c28a;
  white-space:pre-line;
}

.stats{
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}

.stat{
  border:1px solid #4a3717;
  border-radius:12px;
  padding:10px;
  text-align:center;
}

.stat-name{
  font-size:13px;
}

.stat-rate{
  font-size:22px;
  font-weight:900;
  margin-top:4px;
}

.keys{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.key{
  height:45px;
  border:none;
  border-radius:12px;
  background:#222;
  color:#f7e7b3;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.history-list{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.h-item{
  border:1px solid #4a3717;
  border-radius:12px;
  padding:8px;
  background:#181818;
}

.h-top{
  font-size:12px;
  color:#bfa56b;
  margin-bottom:5px;
}

.h-grid{
  display:grid;
  grid-template-columns:1fr 1fr 80px;
  gap:6px;
}

.hit{background:#16a34a;color:#111;}
.miss{background:#dc2626;color:#fff;}
.draw{background:#64748b;color:#fff;}

.box{
  padding:8px;
  border-radius:10px;
  text-align:center;
  font-weight:900;
}

@media(max-width:700px){
  .keys{
    grid-template-columns:repeat(4,1fr);
  }

  .predict-line{
    font-size:18px;
  }

  .card-cell{
    height:52px;
    font-size:18px;
  }
}
</style>
</head>

<body>
<div class="app">

<div class="logo">
  <div class="logo-title">HMR Dual System</div>
  <div class="logo-sub">MATRIX × RUNNING × HE</div>
</div>

<div class="top">

<div class="side">
  <div class="side-title">PLAYER</div>
  <div class="card-grid">
    <div class="card-cell empty p1" data-index="0"></div>
    <div class="card-cell empty p2" data-index="1"></div>
    <div class="card-cell empty p3 span2" data-index="4"></div>
  </div>
</div>

<div class="side">
  <div class="side-title">BANKER</div>
  <div class="card-grid">
    <div class="card-cell empty b1" data-index="2"></div>
    <div class="card-cell empty b2" data-index="3"></div>
    <div class="card-cell empty b3 span2" data-index="5"></div>
  </div>
</div>

</div>

<div class="panel">

<div class="info-row">
  <div class="badge player" id="playerScore">閒 0</div>
  <div class="badge banker" id="bankerScore">莊 0</div>
  <div class="winner tie" id="winnerText">和局</div>

  <button class="btn" id="nextBtn">下一局</button>
  <button class="btn btn-clear" id="clearBtn">清除</button>
</div>

<div class="detail" id="detailText">
請依序輸入牌面
</div>

</div>

<div class="panel">

<div class="predict-line" id="predictLine">
M:-　R:-　HE:-
</div>

<div class="predict-meta" id="predictMeta">
等待分析
</div>

<div class="stats" id="statsBox"></div>

</div>

<div class="panel">

<div class="keys" id="keys">
<button class="key" data-card="A">A</button>
<button class="key" data-card="2">2</button>
<button class="key" data-card="3">3</button>
<button class="key" data-card="4">4</button>
<button class="key" data-card="5">5</button>
<button class="key" data-card="6">6</button>
<button class="key" data-card="7">7</button>
<button class="key" data-card="8">8</button>
<button class="key" data-card="9">9</button>
<button class="key" data-card="10">10</button>
<button class="key" data-card="J">J</button>
<button class="key" data-card="Q">Q</button>
<button class="key" data-card="K">K</button>
<button class="key" id="skipBtn">不補</button>
</div>

</div>

<div class="panel">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
<div style="font-weight:900;">歷史紀錄</div>
<button class="btn" id="clearHistoryBtn">清除歷史</button>
</div>

<div class="history-list" id="historyList"></div>

</div>

</div>

<script>
(function(){

const MAX_HISTORY = 10;

let values = ["","","","","",""];
let currentStep = 0;
let selectedIndex = null;
let historyData = [];
let pendingPrediction = null;
let roundCounter = 1;

const cells = [...document.querySelectorAll(".card-cell")];

function getValue(card){
  if(!card) return 0;
  if(card==="A") return 1;
  if(["10","J","Q","K"].includes(card)) return 0;
  return parseInt(card);
}

function getCards(arr){
  return arr.filter(Boolean);
}

function renderBoard(){

  cells.forEach(cell=>{
    const idx = Number(cell.dataset.index);
    const val = values[idx];

    cell.textContent = val;

    if(val){
      cell.classList.remove("empty");
    }else{
      cell.classList.add("empty");
    }

    cell.classList.remove("active");

    if(selectedIndex===idx){
      cell.classList.add("active");
    }
  });

}

function evaluateM(playerCards, bankerCards, allCards){

  if(playerCards.length<2 || bankerCards.length<2){
    return {
      pick:"-",
      meta:"等待輸入"
    };
  }

  const playerRaw = playerCards.reduce((s,c)=>s+getValue(c),0);
  const bankerRaw = bankerCards.reduce((s,c)=>s+getValue(c),0);

  const diff = Math.abs(playerRaw - bankerRaw);

  const publicCount = allCards.filter(c=>
    ["10","J","Q","K"].includes(c)
  ).length;

  const publicSign = publicCount % 2 === 0 ? "正" : "負";

  const diffSign = playerRaw >= bankerRaw ? "正" : "負";

  const finalSign = diffSign === publicSign ? "正" : "負";

  return {
    pick: finalSign==="正" ? "閒":"莊",
    meta:
      "點差："+diff+
      "\n公牌："+publicSign+
      "\n正負："+finalSign
  };
}

function evaluateR(playerCards, bankerCards, allCards){

  if(playerCards.length<2 || bankerCards.length<2){
    return {
      pick:"-",
      meta:"等待輸入"
    };
  }

  const p = playerCards.reduce((s,c)=>s+getValue(c),0)%10;
  const b = bankerCards.reduce((s,c)=>s+getValue(c),0)%10;

  let total = p+b;

  let pick = total===19 ? "閒":"莊";

  if(allCards.length>=5){
    pick = pick==="閒" ? "莊":"閒";
  }

  return {
    pick,
    meta:
      "尾數："+total+
      "\n翻邊："+(allCards.length>=5?"是":"否")
  };
}

function diffPair(a,b){
  return Math.abs(a-b);
}

function evaluateHE(playerCards, bankerCards){

  if(playerCards.length<2 || bankerCards.length<2){
    return {
      pick:"-",
      meta:"等待輸入"
    };
  }

  let p1 = getValue(playerCards[0]);
  let p2 = getValue(playerCards[1]);

  let b1 = getValue(bankerCards[0]);
  let b2 = getValue(bankerCards[1]);

  let pDiff = diffPair(p1,p2);
  let bDiff = diffPair(b1,b2);

  let value = diffPair(pDiff,bDiff);

  if(playerCards[2]){
    value -= getValue(playerCards[2])/2;
  }

  if(bankerCards[2]){
    value -= getValue(bankerCards[2])/2;
  }

  if(playerCards.length===2 && bankerCards.length===2){
    value = value/2;
    value = value/2;
  }

  if(value>3){
    value = value/2;
  }

  let pick;

  if(value<=2){
    pick="閒";
  }else{
    pick="莊";
  }

  return {
    pick,
    meta:"HE值："+value.toFixed(2)
  };
}

function getActual(playerTotal, bankerTotal){
  if(playerTotal>bankerTotal) return "閒";
  if(bankerTotal>playerTotal) return "莊";
  return "和";
}

function getState(){

  const playerCards = getCards([values[0],values[1],values[4]]);
  const bankerCards = getCards([values[2],values[3],values[5]]);

  const allCards = [...playerCards,...bankerCards];

  const playerTotal = playerCards.reduce((s,c)=>s+getValue(c),0)%10;
  const bankerTotal = bankerCards.reduce((s,c)=>s+getValue(c),0)%10;

  return {
    playerCards,
    bankerCards,
    allCards,
    playerTotal,
    bankerTotal,
    actual:getActual(playerTotal,bankerTotal),
    m:evaluateM(playerCards,bankerCards,allCards),
    r:evaluateR(playerCards,bankerCards,allCards),
    he:evaluateHE(playerCards,bankerCards)
  };
}

function renderMain(){

  const state = getState();

  document.getElementById("playerScore").textContent =
    "閒 "+state.playerTotal;

  document.getElementById("bankerScore").textContent =
    "莊 "+state.bankerTotal;

  document.getElementById("winnerText").textContent =
    state.actual==="閒" ? "閒贏":
    state.actual==="莊" ? "莊贏":"和局";

  renderPredict(state);

}

function renderPredict(state){

  let showM = state.m.pick;
  let showR = state.r.pick;
  let showHE = state.he.pick;

  let meta =
    "M\n"+state.m.meta+
    "\n\nR\n"+state.r.meta+
    "\n\nHE\n"+state.he.meta;

  if(pendingPrediction){

    showM = pendingPrediction.m;
    showR = pendingPrediction.r;
    showHE = pendingPrediction.he;

    meta = pendingPrediction.meta;
  }

  document.getElementById("predictLine").textContent =
    "M:"+showM+"　R:"+showR+"　HE:"+showHE;

  document.getElementById("predictMeta").textContent = meta;

}

function getStatus(pred,actual){

  if(actual==="和") return "-";

  return pred===actual ? "準":"失敗";
}

function renderHistory(){

  const list = document.getElementById("historyList");

  if(historyData.length===0){
    list.innerHTML = "目前沒有紀錄";
    return;
  }

  list.innerHTML = historyData.map(item=>{

    return `
    <div class="h-item">

      <div class="h-top">
      第${item.source}局 → 第${item.target}局
      </div>

      <div class="h-grid">

        <div class="box ${item.mStatus==="準"?"hit":"miss"}">
          M ${item.mPick}<br>
          ${item.mStatus}
        </div>

        <div class="box ${item.rStatus==="準"?"hit":"miss"}">
          R ${item.rPick}<br>
          ${item.rStatus}
        </div>

        <div class="box ${item.heStatus==="準"?"hit":"miss"}">
          HE ${item.hePick}<br>
          ${item.heStatus}
        </div>

      </div>

    </div>
    `;

  }).join("");

}

function renderStats(){

  const box = document.getElementById("statsBox");

  function rate(key){

    const valid = historyData.filter(x=>x[key+"Status"]!=="-");

    if(valid.length===0) return 0;

    const hit = valid.filter(x=>x[key+"Status"]==="準").length;

    return Math.round(hit/valid.length*100);
  }

  const m = rate("m");
  const r = rate("r");
  const he = rate("he");

  box.innerHTML = `
    <div class="stat">
      <div class="stat-name">M勝率</div>
      <div class="stat-rate">${m}%</div>
    </div>

    <div class="stat">
      <div class="stat-name">R勝率</div>
      <div class="stat-rate">${r}%</div>
    </div>

    <div class="stat">
      <div class="stat-name">HE勝率</div>
      <div class="stat-rate">${he}%</div>
    </div>
  `;
}

function renderAll(){

  renderBoard();
  renderMain();
  renderHistory();
  renderStats();

}

function inputCard(card){

  if(selectedIndex!==null){

    values[selectedIndex]=card;
    selectedIndex=null;

  }else{

    if(currentStep>=6) return;

    const order=[0,1,2,3,4,5];

    values[order[currentStep]]=card;

    currentStep++;
  }

  renderAll();
}

function skip(){

  if(currentStep<6){
    currentStep++;
  }

  renderAll();
}

function nextRound(){

  const state = getState();

  if(pendingPrediction){

    historyData.unshift({

      source:pendingPrediction.round,
      target:pendingPrediction.round+1,

      mPick:pendingPrediction.m,
      rPick:pendingPrediction.r,
      hePick:pendingPrediction.he,

      mStatus:getStatus(
        pendingPrediction.m,
        state.actual
      ),

      rStatus:getStatus(
        pendingPrediction.r,
        state.actual
      ),

      heStatus:getStatus(
        pendingPrediction.he,
        state.actual
      )

    });

    historyData = historyData.slice(0,MAX_HISTORY);
  }

  pendingPrediction = {

    round:roundCounter,

    m:state.m.pick,
    r:state.r.pick,
    he:state.he.pick,

    meta:
      "M\n"+state.m.meta+
      "\n\nR\n"+state.r.meta+
      "\n\nHE\n"+state.he.meta
  };

  roundCounter++;

  values=["","","","","",""];
  currentStep=0;
  selectedIndex=null;

  renderAll();
}

function clearBoard(){

  values=["","","","","",""];
  currentStep=0;
  selectedIndex=null;

  renderAll();
}

function clearHistory(){

  historyData=[];
  pendingPrediction=null;
  roundCounter=1;

  renderAll();
}

cells.forEach(cell=>{

  cell.addEventListener("click",()=>{

    selectedIndex = Number(cell.dataset.index);

    renderBoard();

  });

});

document.getElementById("keys")
.addEventListener("click",e=>{

  const btn = e.target.closest("[data-card]");

  if(!btn) return;

  inputCard(btn.dataset.card);

});

document.getElementById("skipBtn")
.addEventListener("click",skip);

document.getElementById("nextBtn")
.addEventListener("click",nextRound);

document.getElementById("clearBtn")
.addEventListener("click",clearBoard);

document.getElementById("clearHistoryBtn")
.addEventListener("click",clearHistory);

renderAll();

})();
</script>

</body>
</html>
